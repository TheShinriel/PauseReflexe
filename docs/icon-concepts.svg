<svg width="960" height="560" viewBox="0 0 960 560" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="960" height="560" rx="28" fill="#f6f7fb"/>
  <style>
    .title { font: 800 26px system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #17202a; }
    .label { font: 800 17px system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #17202a; }
    .meta { font: 500 13px system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #667085; }
    .score { font: 800 13px system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #2563eb; }
  </style>

  <text x="40" y="54" class="title">Pause Réflexe — pistes d’icône</text>
  <text x="40" y="82" class="meta">Objectif : lisible en 16×16, calme, non punitif, orienté changement d’habitude.</text>

  <!-- Card helper backgrounds -->
  <g transform="translate(40 120)">
    <rect width="160" height="220" rx="22" fill="white" stroke="#e5e7eb"/>
    <rect x="36" y="24" width="88" height="88" rx="24" fill="#2563eb"/>
    <!-- A shield + pause -->
    <path d="M80 39L108 50V72C108 91 95 104 80 110C65 104 52 91 52 72V50L80 39Z" fill="#eff6ff"/>
    <rect x="70" y="60" width="7" height="32" rx="3.5" fill="#2563eb"/>
    <rect x="83" y="60" width="7" height="32" rx="3.5" fill="#2563eb"/>
    <text x="20" y="145" class="label">A — Bouclier pause</text>
    <text x="20" y="172" class="meta">Très lisible, rassurant.</text>
    <text x="20" y="196" class="score">Score : 8/10</text>
  </g>

  <g transform="translate(220 120)">
    <rect width="160" height="220" rx="22" fill="white" stroke="#e5e7eb"/>
    <rect x="36" y="24" width="88" height="88" rx="24" fill="#2563eb"/>
    <!-- B cursor interrupted -->
    <path d="M59 45L105 69L84 76L74 100L59 45Z" fill="#eff6ff" stroke="#eff6ff" stroke-linejoin="round"/>
    <rect x="94" y="47" width="6" height="31" rx="3" fill="white"/>
    <rect x="106" y="47" width="6" height="31" rx="3" fill="white"/>
    <text x="20" y="145" class="label">B — Clic interrompu</text>
    <text x="20" y="172" class="meta">Très lié au navigateur.</text>
    <text x="20" y="196" class="score">Score : 7/10</text>
  </g>

  <g transform="translate(400 120)">
    <rect width="160" height="220" rx="22" fill="white" stroke="#e5e7eb"/>
    <rect x="36" y="24" width="88" height="88" rx="24" fill="#2563eb"/>
    <!-- C reflex loop broken by pause -->
    <path d="M99 72C99 85.8 87.8 97 74 97C60.2 97 49 85.8 49 72C49 58.2 60.2 47 74 47C82.4 47 89.8 51.1 94.3 57.5" stroke="#eff6ff" stroke-width="8" stroke-linecap="round"/>
    <path d="M96 43L98 61L81 57" fill="#eff6ff"/>
    <rect x="77" y="58" width="7" height="32" rx="3.5" fill="white"/>
    <rect x="90" y="58" width="7" height="32" rx="3.5" fill="white"/>
    <circle cx="103" cy="96" r="7" fill="#027a48"/>
    <text x="20" y="145" class="label">C — Boucle brisée</text>
    <text x="20" y="172" class="meta">Meilleur fit produit.</text>
    <text x="20" y="196" class="score">Score : 9/10</text>
  </g>

  <g transform="translate(580 120)">
    <rect width="160" height="220" rx="22" fill="white" stroke="#e5e7eb"/>
    <rect x="36" y="24" width="88" height="88" rx="24" fill="#2563eb"/>
    <!-- D hand pause -->
    <path d="M57 78C57 70 63 68 67 73V52C67 48 73 48 73 52V72V49C73 45 79 45 79 49V72V53C79 49 85 49 85 53V74V60C85 56 91 56 91 60V81C91 96 81 104 71 104C62 104 55 97 52 86L49 75C48 71 54 69 57 78Z" fill="#eff6ff"/>
    <rect x="96" y="50" width="6" height="30" rx="3" fill="white"/>
    <rect x="108" y="50" width="6" height="30" rx="3" fill="white"/>
    <text x="20" y="145" class="label">D — Reprendre la main</text>
    <text x="20" y="172" class="meta">Humain, mais détaillé.</text>
    <text x="20" y="196" class="score">Score : 6/10</text>
  </g>

  <g transform="translate(760 120)">
    <rect width="160" height="220" rx="22" fill="white" stroke="#e5e7eb"/>
    <rect x="36" y="24" width="88" height="88" rx="24" fill="#2563eb"/>
    <!-- E step + pause -->
    <path d="M55 86H73V68H91V50H107" stroke="#eff6ff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="58" y="47" width="7" height="29" rx="3.5" fill="white"/>
    <rect x="71" y="47" width="7" height="29" rx="3.5" fill="white"/>
    <circle cx="105" cy="50" r="7" fill="#027a48"/>
    <text x="20" y="145" class="label">E — Étape de progrès</text>
    <text x="20" y="172" class="meta">Positif, moins explicite.</text>
    <text x="20" y="196" class="score">Score : 7/10</text>
  </g>

  <rect x="40" y="390" width="880" height="110" rx="22" fill="white" stroke="#bfdbfe"/>
  <text x="68" y="430" class="label">Recommandation : C — Boucle brisée par pause</text>
  <text x="68" y="459" class="meta">C’est le plus spécifique à Pause Réflexe : casser une boucle automatique sans tomber dans le vocabulaire punitif du blocage.</text>
  <text x="68" y="486" class="meta">Fallback le plus sûr si on veut maximiser la lisibilité toolbar : A — Bouclier pause.</text>
</svg>
