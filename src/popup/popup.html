<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="popup.css" />
    <title>Site Blocker</title>
  </head>
  <body>
    <main>
      <h1>Site Blocker</h1>
      <p id="domain" class="domain">Chargement…</p>
      <button id="blockButton" type="button">Bloquer ce site</button>
      <label class="switch-row">
        <input id="pauseSwitch" type="checkbox" />
        <span>Désactiver les blocages pour cette session</span>
      </label>

      <details id="blockedSitesPanel">
        <summary>Sites bloqués</summary>
        <div class="sort-row">
          <label for="sortMode">Tri</label>
          <select id="sortMode">
            <option value="alphabetical">A-Z</option>
            <option value="addedAtDesc">Ajout récent</option>
          </select>
        </div>
        <ul id="blockedSitesList"></ul>
      </details>

      <p id="status" role="status"></p>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
