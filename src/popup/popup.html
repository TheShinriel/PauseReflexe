<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="popup.css" />
    <title>Pause Réflexe</title>
  </head>
  <body>
    <main class="popup-shell">
      <header class="popup-header">
        <div>
          <p class="eyebrow">Changer une habitude</p>
          <h1>Pause Réflexe</h1>
        </div>
        <div class="quick-pause" aria-label="État des pauses">
          <span id="globalStatus" class="status-pill active">Actif</span>
          <label class="quick-pause-switch" title="Désactiver les pauses pour cette session">
            <input id="pauseSwitch" type="checkbox" />
            <span class="switch-track" aria-hidden="true"></span>
            <span class="sr-only">Désactiver les pauses</span>
          </label>
        </div>
      </header>

      <section class="app-card current-site-card" aria-labelledby="currentSiteTitle">
        <div id="currentSiteControls" class="current-site-controls">
          <div class="section-heading">
            <h2 id="currentSiteTitle" class="section-title">Ce site</h2>
            <span id="domainStatus" class="status-pill safe">Pas en pause</span>
          </div>
          <p id="domain" class="domain-chip">Chargement…</p>
          <button id="blockButton" class="button-primary" type="button">Mettre ce site en pause</button>
        </div>
        <div id="pauseSuccessFrame" class="pause-success-frame" hidden>
          <p class="eyebrow">Site mis en pause</p>
          <h2>Bravo</h2>
          <p id="pauseSuccessMessage">Bravo, une étape de plus vers un changement.</p>
        </div>
      </section>

      <section class="app-card blocked-card" aria-labelledby="blockedSitesTitle">
        <details id="blockedSitesPanel">
          <summary>
            <span id="blockedSitesTitle">Sites en pause</span>
            <span id="blockedCount" class="count-pill">0</span>
          </summary>
          <div class="sort-row">
            <label for="sortMode" class="muted">Tri</label>
            <select id="sortMode">
              <option value="alphabetical">A-Z</option>
              <option value="addedAtDesc">Ajout récent</option>
            </select>
          </div>
          <ul id="blockedSitesList"></ul>
        </details>
      </section>

      <p id="status" role="status"></p>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
