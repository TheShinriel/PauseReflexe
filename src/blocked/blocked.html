<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="blocked.css" />
    <title>Site bloqué</title>
  </head>
  <body>
    <main class="card">
      <p class="eyebrow">Pause volontaire</p>
      <h1>Ce site est bloqué</h1>
      <p>
        Tu as choisi de bloquer <strong id="domain">ce site</strong> pour réduire cette habitude.
      </p>
      <p class="soft">
        Si tu veux vraiment y aller maintenant, choisis une durée temporaire.
      </p>

      <label for="duration">Durée temporaire : <strong id="durationLabel">10 min</strong></label>
      <input id="duration" type="range" min="0" max="2" step="1" value="1" />
      <div class="ticks"><span>5 min</span><span>10 min</span><span>30 min</span></div>

      <button id="continueButton" type="button">Débloquer temporairement</button>
      <p id="status" role="status"></p>
    </main>
    <script type="module" src="blocked.js"></script>
  </body>
</html>
